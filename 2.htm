<div id="file-gate-overlay" aria-hidden="false">
  <label class="file-gate-label" for="fileGateInput">
    <input id="fileGateInput" type="file" accept=".csv,text/csv" />
    <span>請上傳檔案驗證 Please upload verified file</span>
  </label>
  <div class="file-gate-note"></div>
</div>
<div id="app" aria-hidden="true">
  <!-- 你原本的複雜 HTML -->
</div>
<style>
#file-gate-overlay { position:fixed; inset:0; background:#fff; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; }
body.noscroll { overflow:hidden; }
#file-gate-overlay input[type="file"] { position:absolute; width:1px; height:1px; clip:rect(0 0 0 0); border:0; }
</style>
<script>
(function(){
  const overlay = document.getElementById('file-gate-overlay');
  const fileInput = document.getElementById('fileGateInput');
  const app = document.getElementById('app');
  document.body.classList.add('noscroll');

  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const name = file.name || '';
    const ext = name.split('.').pop().toLowerCase();
    const mimeOk = file.type === 'text/csv' || file.type === 'application/vnd.ms-excel' || ext === 'csv';
    if (!mimeOk) { alert('請上傳 CSV 檔案'); fileInput.value = ''; return; }

    // 可選：讀取或上傳檔案做進一步驗證
    // const text = await file.text();

    // 移除遮罩並還原頁面
    overlay.remove();
    document.body.classList.remove('noscroll');
    app.setAttribute('aria-hidden', 'false');

    // 若其他程式需要檔案，發送自訂事件
    window.dispatchEvent(new CustomEvent('fileGateFileSelected', { detail: { file } }));

  });
})();
</script>

        /* ==============================================

<body>
    <!-- 固定菜单切换按钮：解决菜单隐藏后无法恢复的问题 -->

        <!-- 3. 三层嵌套分组：主分组+二级子组+三级子组 -->
        <div class="control-group"><label>Group Level 1 (Main):</label><select id="groupLevel1"><option value="none">No Group</option><option value="fixedCount">Fixed Count</option><option value="idRange">ID Range</option><option value="pinyinInitial">Pinyin Initial</option><option value="charCount">Character Count</option></select></div>
        <div class="control-group"><label>Level 2 (Sub):</label><select id="groupLevel2"><option value="none">None</option><option value="tone">Tone</option><option value="charCount">Character Count</option><option value="pinyinInitial">Pinyin Initial</option><option value="fullPinyin">Full Pinyin</option></select></div>
        <div class="control-group"><label>Level 3 (Sub):</label><select id="groupLevel3"><option value="none">None</option><option value="tone">Tone</option><option value="charCount">Character Count</option><option value="pinyinInitial">Pinyin Initial</option><option value="fullPinyin">Full Pinyin</option></select></div>

        <!-- 7. 完整拼音精准筛选 -->

        <!-- 8. 排序功能：ID/拼音/字数，正序/倒序 -->

        <!-- 9. 汉字显示模式：4种繁简组合 -->
        <div class="control-group"><label>Display Mode:</label><select id="displayMode"><option value="tc_only">Traditional Only (TC)</option><option value="sc_only">Simplified Only (SC)</option><option value="tc_sc">TC + SC (TC Top)</option><option value="sc_tc">SC + TC (SC Top)</option></select></div>

        <!-- 10. 卡片大小调节：滑动条动态调整 -->
        <div class="control-group"><label>Card Size:</label><input type="range" id="cardSize" min="80" max="300" value="140"></div>

        <!-- 11. 随机卡片：自定义随机数量 -->
        <div class="control-group"><label>Random Cards:</label><input type="number" id="randomCount" min="1" value="20" style="width:60px;"><button onclick="randomCards()">Generate</button></div>

        <!-- 12. 清除已学习记录：重置本地存储 -->
        <div class="control-group"><button onclick="clearLearned()">Clear Learned Words</button></div>

        <!-- 13. 语音朗读切换：标准/自然语音 -->
        <div class="control-group"><button id="voiceToggleBtn" onclick="toggleVoice()">Normal</button></div>

        <!-- ==================== 精准导出功能：菜单最后位置，导出当前显示的所有卡片 ==================== -->
        <div class="control-group">
            <label>Export Displayed:</label>
            <select id="exportFormat">
                <option value="csv">CSV File</option>
                <option value="excel">Excel File</option>

    <!-- 词汇卡片展示容器 -->
    <div id="cards"></div>
    <!-- 无数据提示 -->
    <div id="empty-state" style="display:none;">No vocabulary found. Import a CSV file to start!</div>

    <script>
        // ==============================================
        // 全局变量定义：存储核心数据，避免重复声明
        // ==============================================
        let vocabulary = [];          // 原始全部词汇数组
        let filteredVocab = [];       // 筛选后当前展示的词汇数组（导出数据源）
        let learnedWords = new Set(); // 已学习词汇ID集合（本地存储）
        let categories = { all: [] }; // 多CSV文件分类管理
        const MAX_CSV_SIZE = 5 * 1024 * 1024; // CSV文件大小限制：5MB

        // ==============================================
        // DOM元素缓存：避免重复查询DOM，提升性能
        // ==============================================
        const errorMsg = document.getElementById('error-message');
        const loading = document.getElementById('loading');
        const progressBar = document.getElementById('progressBar');
        const cardsContainer = document.getElementById('cards');
        const emptyState = document.getElementById('empty-state');

        // ==============================================
        // 页面初始化：DOM加载完成后执行
        // ==============================================
        document.addEventListener('DOMContentLoaded', () => {
            loadLearnedWords();    // 加载本地存储的已学习记录
            updateCardSize();      // 初始化卡片尺寸
            bindEvents();          // 绑定所有交互事件
            updateStats();          // 更新学习统计
            toggleMenu();           // 初始化菜单显示状态
        });

        // ==============================================
        // 事件绑定统一管理：所有交互事件集中绑定
        // ==============================================
        function bindEvents() {
            document.getElementById('csvFile').addEventListener('change', handleCSVUpload);
            document.getElementById('search').addEventListener('input', applyAllFilters);
            document.getElementById('charFilter').addEventListener('change', applyAllFilters);
            document.getElementById('pinyinInitialFilter').addEventListener('change', applyAllFilters);
            document.getElementById('pinyinFilter').addEventListener('input', applyAllFilters);
            document.getElementById('sortOption').addEventListener('change', applyAllFilters);
            document.getElementById('sortOrder').addEventListener('change', applyAllFilters);
            document.getElementById('displayMode').addEventListener('change', renderCards);
            document.getElementById('cardSize').addEventListener('input', updateCardSize);
            document.getElementById('categorySelector').addEventListener('change', applyCategoryFilter);
            document.getElementById('toggleMenuBtn').addEventListener('click', toggleMenu);
            // 三层分组事件
            document.getElementById('groupLevel1').addEventListener('change', applyAllFilters);
            document.getElementById('groupLevel2').addEventListener('change', applyAllFilters);
            document.getElementById('groupLevel3').addEventListener('change', applyAllFilters);
        }

        // ==============================================
        // 功能1：菜单显示/隐藏切换
        // ==============================================
        function toggleMenu() {
            const menu = document.getElementById('menu');
            const btn = document.getElementById('toggleMenuBtn');
            const isHidden = menu.style.display === 'none';
            menu.style.display = isHidden ? 'block' : 'none';
            btn.textContent = isHidden ? 'Hide Menu' : 'Show Menu';
        }

        // ==============================================
        // 功能2：更新学习进度统计
        // ==============================================
        function updateStats() {
            const total = filteredVocab.length;
            const learned = [...learnedWords].filter(id => filteredVocab.some(v => v.id === id)).length;
            const remaining = total - learned;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('learnedCount').textContent = learned;
            document.getElementById('remainingCount').textContent = remaining;
        }

        // ==============================================
        // 功能3：CSV文件上传与解析
        // ==============================================
        async function handleCSVUpload(e) {
            const files = e.target.files;
            if (!files.length) return;

            for (const file of files) {
                if (file.size > MAX_CSV_SIZE) { showError(`File ${file.name} exceeds 5MB limit!`, true); continue; }
                loading.style.display = 'block';
                const reader = new FileReader();

                // 加载进度条
                reader.onprogress = (event) => { if (event.lengthComputable) progressBar.style.width = (event.loaded / event.total)*100 + '%'; };
                
                // 读取完成
                reader.onload = (event) => {
                    try {
                        const data = parseCSVRobust(event.target.result);
                        const categoryName = file.name.replace('.csv', '');
                        categories[categoryName] = data;
                        categories.all = [...categories.all, ...data];
                        vocabulary = [...categories.all];
                        filteredVocab = [...vocabulary];
                        updateCategorySelector();
                        applyAllFilters();
                        showError(`Imported ${data.length} words from ${file.name}!`, false);
                    } catch (err) { showError(`Parse Error: ${err.message}`, true);
                    } finally { loading.style.display = 'none'; progressBar.style.width = '0%'; }
                };
                reader.readAsText(file);
            }
        }

        // ==============================================
        // 功能4：分类选择器更新
        // ==============================================
        function updateCategorySelector() {
            const selector = document.getElementById('categorySelector');
            selector.innerHTML = '<option value="all">All Categories</option>';
            Object.keys(categories).forEach(cat => { if(cat!=='all'){ const o=document.createElement('option');o.value=cat;o.textContent=cat;selector.appendChild(o); } });
            selector.style.display = 'inline-block';
        }
        function applyCategoryFilter() {
            const selected = document.getElementById('categorySelector').value;
            vocabulary = selected==='all' ? [...categories.all] : [...categories[selected]];
            applyAllFilters();
        }

        // ==============================================
        // 功能5：多维度筛选总函数
        // ==============================================
        function applyAllFilters() {
            if(!vocabulary.length){ filteredVocab=[]; renderCards(); return; }
            let result = [...vocabulary];
            const search = document.getElementById('search').value.toLowerCase();
            const charFilter = document.getElementById('charFilter').value;
            const pinyinInitial = document.getElementById('pinyinInitialFilter').value;
            const pinyinFilter = document.getElementById('pinyinFilter').value.toLowerCase();

            // 关键词筛选
            if(search) result = result.filter(v=>v.simplified.toLowerCase().includes(search)||v.traditional.toLowerCase().includes(search)||v.pinyin.toLowerCase().includes(search)||v.meaning.toLowerCase().includes(search));
            // 字数筛选
            if(charFilter!=='all') result=result.filter(v=>{const l=v.simplified.length;return charFilter==='10+'?l>10:l===parseInt(charFilter);});
            // 拼音首字母筛选
            if(pinyinInitial!=='all'){const m={'a':/^[aāáǎà]/i,'e':/^[eēéěè]/i,'i':/^[iīíǐì]/i,'o':/^[oōóǒò]/i,'u':/^[uūúǔù]/i};const r=m[pinyinInitial]||new RegExp(`^${pinyinInitial}`,'i');result=result.filter(v=>r.test(v.pinyin.trim()));}
            // 完整拼音筛选
            if(pinyinFilter){const r=new RegExp(pinyinFilter,'i');result=result.filter(v=>r.test(v.pinyin));}
            // 排序
            const s=document.getElementById('sortOption').value,o=document.getElementById('sortOrder').value==='asc'?1:-1;
            result.sort((a,b)=>{if(s==='pinyin')return a.pinyin.localeCompare(b.pinyin)*o;if(s==='length')return(a.simplified.length-b.simplified.length)*o;return(a.id-b.id)*o;});
            
            filteredVocab=result;renderCards();
        }

        // ==============================================
        // 功能6：随机生成卡片
        // ==============================================
        function randomCards() {
            if(!filteredVocab.length){showError("No vocabulary to randomize!",true);return;}
            let n=parseInt(document.getElementById('randomCount').value)||20;n=Math.max(1,Math.min(n,filteredVocab.length));
            filteredVocab=[...filteredVocab].sort(()=>Math.random()-0.5).slice(0,n);
            renderCards();showError(`Showing ${n} random cards!`,false);
        }

        // ==============================================
        // 功能7：语音朗读(TTS)
        // ==============================================
        let useNaturalVoice=false;
        function toggleVoice(){useNaturalVoice=!useNaturalVoice;const b=document.getElementById("voiceToggleBtn");b.textContent=useNaturalVoice?"Natural":"Normal";if(useNaturalVoice)preloadVoice();}
        function preloadVoice(){if(!useNaturalVoice)return;const v=window.speechSynthesis.getVoices();const nv=v.find(vo=>vo.name.toLowerCase().includes('xiaoxiao')&&vo.name.toLowerCase().includes('natural'));if(nv){const u=new SpeechSynthesisUtterance(".");u.voice=nv;window.speechSynthesis.speak(u);showError(`Preloaded voice: ${nv.name}`,false);}}
        window.speechSynthesis.onvoiceschanged=preloadVoice;
        function speakWord(text){if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='zh-CN';u.rate=0.9;u.pitch=1.0;const v=window.speechSynthesis.getVoices();let cv;if(useNaturalVoice)cv=v.find(vo=>vo.name.toLowerCase().includes('xiaoxiao')&&vo.name.toLowerCase().includes('natural'))||v.find(vo=>vo.name.includes('Google 中文（普通话）'));else cv=v.find(vo=>vo.lang.includes('zh-CN')||vo.lang.includes('zh-TW')||vo.lang.includes('zh-HK'));if(cv)u.voice=cv;window.speechSynthesis.speak(u);}

        // ==============================================
        // 功能8：三层嵌套分组逻辑
        // ==============================================
        function getPinyinTone(p){const t={1:'āēīōū',2:'áéíóú',3:'ǎěǐǒǔ',4:'àèìòù'};for(let [n,c]of Object.entries(t))if([...c].some(ch=>p.includes(ch)))return`Tone ${n}`;return'Tone 0';}
        function groupVocabulary(words){const g1=document.getElementById('groupLevel1').value,g2=document.getElementById('groupLevel2').value,g3=document.getElementById('groupLevel3').value;if(g1==='none')return{'All Words':words};const g={};const s=20;words.forEach(w=>{let k1='Other';if(g1==='fixedCount')k1=`Group ${Math.ceil(w.id/s)}`;if(g1==='idRange')k1=`ID ${Math.floor(w.id/100)*100}-${Math.floor(w.id/100)*100+99}`;if(g1==='pinyinInitial')k1=w.pinyin.trim().charAt(0).toUpperCase();if(g1==='charCount')k1=`${w.simplified.length} Char(s)`;let k2='Sub Group All';if(g2==='tone')k2=getPinyinTone(w.pinyin);if(g2==='charCount')k2=`${w.simplified.length} Char(s)`;if(g2==='pinyinInitial')k2=w.pinyin.trim().charAt(0).toUpperCase();if(g2==='fullPinyin')k2=w.pinyin;let k3='Sub Sub Group All';if(g3==='tone')k3=getPinyinTone(w.pinyin);if(g3==='charCount')k3=`${w.simplified.length} Char(s)`;if(g3==='pinyinInitial')k3=w.pinyin.trim().charAt(0).toUpperCase();if(g3==='fullPinyin')k3=w.pinyin;const fk=`${k1} | ${k2} | ${k3}`;if(!g[fk])g[fk]=[];g[fk].push(w);});return g;}

        // ==============================================
        // 功能9：卡片渲染（支持分组）
        // ==============================================
        function renderCards(){cardsContainer.innerHTML='';const hd=filteredVocab.length>0;emptyState.style.display=hd?'none':'block';updateStats();if(!hd)return;const m=document.getElementById('displayMode').value;const gd=groupVocabulary(filteredVocab);Object.entries(gd).forEach(([gn,ws])=>{const gs=document.createElement('div');gs.className='group-section';const gt=document.createElement('div');gt.className='group-title';gt.textContent=`📚 ${gn} (${ws.length} words)`;gs.appendChild(gt);const g=document.createElement('div');g.className='card-grid';ws.forEach(w=>{const c=document.createElement('div');c.className=`card ${learnedWords.has(w.id)?'learned':''}`;let ch='',st=w.simplified;switch(m){case'tc_only':ch=`<div class="primary-char">${w.traditional}</div>`;break;case'sc_only':ch=`<div class="primary-char">${w.simplified}</div>`;st=w.simplified;break;case'tc_sc':ch=`<div class="char-group"><div class="primary-char">${w.traditional}</div><div class="secondary-char">${w.simplified}</div></div>`;break;case'sc_tc':ch=`<div class="char-group"><div class="primary-char">${w.simplified}</div><div class="secondary-char">${w.traditional}</div></div>`;st=w.simplified;break;}const cc=document.getElementById('categorySelector').value||'All';c.innerHTML=`<div class="card-tooltip">分类: ${cc} | ID: ${w.id}</div>${ch}<div class="pinyin">${w.pinyin}</div><div class="meaning">${w.meaning}</div>`;c.addEventListener('click',()=>toggleLearnedState(w.id,c));c.addEventListener('mouseenter',()=>speakWord(st));g.appendChild(c);});gs.appendChild(g);cardsContainer.appendChild(gs);});}

        // ==============================================
        // 功能10：【新增】精准导出当前显示词汇
        // 核心说明：导出数据源 = filteredVocab（页面实际显示的卡片）
        // 匹配规则：严格同步分类/筛选/分组/排序/随机结果，无偏差
        // 格式支持：CSV/Excel/Word，自带UTF-8 BOM解决中文乱码
        // 修复：将所有单元格强制转为字符串，解决数字类型无replace方法报错
        // ==============================================
        function exportCurrentVocab() {
            // 无显示数据时终止导出并提示
            if (!filteredVocab.length) {
                showError("No displayed cards to export!", true);
                return;
            }

            // 获取用户选择的导出格式
            const exportFormat = document.getElementById('exportFormat').value;
            // 导出文件表头
            const exportHeaders = ['ID', 'Traditional', 'Simplified', 'Pinyin', 'Meaning'];
            // 导出数据：直接使用当前页面显示的词汇数组（已筛选/排序/分组）
            const exportData = filteredVocab.map(item => [
                item.id,
                item.traditional,
                item.simplified,
                item.pinyin,
                item.meaning
            ]);

            // -------------------- 导出 CSV / Excel 格式 --------------------
            if (exportFormat === 'csv' || exportFormat === 'excel') {
                // 组装CSV内容，添加UTF-8 BOM防止中文乱码
                // 🔥 修复点：强制将cell转为字符串 String(cell)，兼容数字/文本，解决replace报错
                const csvRows = [
                    exportHeaders.join(','),
                    ...exportData.map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
                ];
                const csvContent = '\ufeff' + csvRows.join('\n');

                // 配置MIME类型与文件后缀
                let mimeType, fileExtension;
                if (exportFormat === 'csv') {
                    mimeType = 'text/csv';
                    fileExtension = 'csv';
                } else {
                    mimeType = 'application/vnd.ms-excel';
                    fileExtension = 'xls'; // Excel原生兼容格式
                }

                // 创建下载链接并触发下载
                const blob = new Blob([csvContent], { type: mimeType });
                const downloadUrl = URL.createObjectURL(blob);
                const downloadLink = document.createElement('a');
                downloadLink.href = downloadUrl;
                downloadLink.download = `Chinese_Vocab_Displayed_${new Date().getTime()}.${fileExtension}`;
                downloadLink.click();
                URL.revokeObjectURL(downloadUrl);
            }

            // -------------------- 导出 Word 格式 --------------------
            if (exportFormat === 'word') {
                // 生成Word兼容的HTML表格格式
                let wordHtml = `<html>
<head><meta charset="UTF-8"></head>
<body>
    <h2>Displayed Chinese Vocabulary List</h2>
    <p>Export Time: ${new Date().toLocaleString()}</p>
    <table border="1" cellpadding="8" cellspacing="0" width="100%">
        <tr>${exportHeaders.map(header => `<th>${header}</th>`).join('')}</tr>
        ${exportData.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('')}
    </table>
</body>
</html>`;

                // 创建下载链接并触发下载
                const blob = new Blob(['\ufeff' + wordHtml], { type: 'application/msword' });
                const downloadUrl = URL.createObjectURL(blob);
                const downloadLink = document.createElement('a');
                downloadLink.href = downloadUrl;
                downloadLink.download = `Chinese_Vocab_Displayed_${new Date().getTime()}.doc`;
                downloadLink.click();
                URL.revokeObjectURL(downloadUrl);
            }

            // 导出成功提示
            showError(`Successfully exported ${filteredVocab.length} displayed words!`, false);
        }

        // ==============================================
        // 功能11：已学习词汇管理（本地存储）
        // ==============================================
        function toggleLearnedState(id,c){learnedWords.has(id)?learnedWords.delete(id):learnedWords.add(id);c.classList.toggle('learned');saveLearnedWords();updateStats();}
        function clearLearned(){if(!confirm('Clear all learned words?'))return;learnedWords.clear();saveLearnedWords();renderCards();showError('Learned words cleared!',false);}
        function saveLearnedWords(){localStorage.setItem('learnedWords',JSON.stringify([...learnedWords]));}
        function loadLearnedWords(){const s=localStorage.getItem('learnedWords');if(s)learnedWords=new Set(JSON.parse(s));}

        // ==============================================
        // 工具函数：卡片尺寸更新、提示框、CSV解析
        // ==============================================
        function updateCardSize(){document.documentElement.style.setProperty('--card-size',document.getElementById('cardSize').value+'px');}
        function showError(text,isError){errorMsg.textContent=text;errorMsg.className=isError?'error':'success';errorMsg.style.display='block';setTimeout(()=>errorMsg.style.display='none',isError?7000:3000);}

function parseCSVRobust(text){
    const l=text.replace(/\r/g,'\n').split('\n').filter(i=>i.trim());
    if(!l.length)throw new Error("Empty CSV file");
    const map={'id':'id','tc':'traditional','traditional':'traditional','sc':'simplified','simplified':'simplified','py':'pinyin','pinyin':'pinyin','mean':'meaning','meaning':'meaning'};
    const rh=l[0].split(',').map(h=>h.trim().toLowerCase());
    const h=rh.map(i=>map[i]||i);
    const req=['id','traditional','simplified','pinyin','meaning'];
    const miss=req.filter(c=>!h.includes(c));
    if(miss.length)throw new Error(`Missing columns: ${miss.join(', ')}. Supported headers: id,tc,sc,py,mean`);
    // 🔥 修复点：取消数字转换，直接保留原始ID字符串
    return l.slice(1).map((line,idx)=>{
        const v=line.split(',').map(i=>i.trim());
        const g=(c)=>v[h.indexOf(c)]||'';
        // 原错误：id:parseInt(g('id'))||idx+1
        // 新修复：直接读取原始ID，空ID则自动生成唯一ID
        return{id:g('id') || `AUTO_${idx+1}`,traditional:g('traditional'),simplified:g('simplified'),pinyin:g('pinyin'),meaning:g('meaning')};
    }).filter(v=>v.simplified||v.traditional);
}

    </script>
